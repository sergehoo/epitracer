name: Mobile CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-ci.yml'
  pull_request:
    paths:
      - 'mobile/**'

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache pub deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            mobile/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Pub get
        run: flutter pub get

      - name: Codegen (freezed, json_serializable, riverpod)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Vérifier formatage
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyzer
        run: flutter analyze --no-fatal-infos

      - name: Tests
        run: flutter test --coverage --reporter=expanded

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: mobile/coverage/lcov.info
          if-no-files-found: ignore

  build-android:
    needs: analyze-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Décoder le keystore depuis secret
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          mkdir -p android/keys
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/keys/release.keystore
          cat > android/key.properties <<EOF
          storeFile=keys/release.keystore
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Récupérer google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json

      - name: Build AAB (Play Store)
        run: flutter build appbundle --release

      - name: Build APK universel (sideload / pré-prod)
        run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            mobile/build/app/outputs/bundle/release/*.aab
            mobile/build/app/outputs/flutter-apk/*-release.apk

  build-ios:
    needs: analyze-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Codegen
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Installer le certificat Apple + provisioning
        if: ${{ secrets.APPLE_CERT_BASE64 != '' }}
        env:
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_PROVISION_BASE64: ${{ secrets.APPLE_PROVISION_BASE64 }}
          APPLE_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
        run: |
          # Création d'un keychain temporaire pour CI
          security create-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$APPLE_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import du certificat de signature
          echo "$APPLE_CERT_BASE64" | base64 --decode > /tmp/apple.p12
          security import /tmp/apple.p12 -k build.keychain \
            -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign:, \
            -s -k "$APPLE_KEYCHAIN_PASSWORD" build.keychain

          # Installation du provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISION_BASE64" | base64 --decode > \
            "$HOME/Library/MobileDevice/Provisioning Profiles/distribution.mobileprovision"

      - name: Récupérer GoogleService-Info.plist
        if: ${{ secrets.GOOGLE_SERVICES_PLIST_BASE64 != '' }}
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_PLIST_BASE64 }}" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Build IPA (App Store)
        run: |
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - uses: actions/upload-artifact@v4
        with:
          name: ios-release
          path: mobile/build/ios/ipa/*.ipa
