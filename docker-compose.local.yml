version: "3.9"

# =========================================================================
# EpidemiTracker — overlay LOCAL (test de la séparation des domaines).
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
#
# Une fois lancé, les URLs suivantes sont accessibles sur ta machine
# SANS toucher /etc/hosts (lvh.me résout toujours vers 127.0.0.1) :
#
#   Portail public : http://destinationci.lvh.me
#   Portail admin  : http://inhpadmin.lvh.me
#   API Django     : http://api.lvh.me
#   Traefik UI     : http://traefik.lvh.me:8080
#
# Le middleware Next.js applique la même logique de séparation qu'en prod.
# =========================================================================

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.insecure=true
      - --api.dashboard=true
      - --log.level=INFO
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # Backend Django exposé via Traefik sur api.lvh.me
  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
      DJANGO_CSRF_TRUSTED_ORIGINS: http://api.lvh.me,http://destinationci.lvh.me,http://inhpadmin.lvh.me
      DJANGO_CORS_ALLOWED_ORIGINS: http://destinationci.lvh.me,http://inhpadmin.lvh.me
    labels:
      - traefik.enable=true
      - traefik.http.routers.api-local.rule=Host(`api.lvh.me`)
      - traefik.http.routers.api-local.entrypoints=web
      - traefik.http.services.api-local.loadbalancer.server.port=8000

  # Channels (WebSocket) exposé via Traefik sur ws.lvh.me
  channels:
    labels:
      - traefik.enable=true
      - traefik.http.routers.ws-local.rule=Host(`ws.lvh.me`)
      - traefik.http.routers.ws-local.entrypoints=web
      - traefik.http.services.ws-local.loadbalancer.server.port=8001

  # Frontend Next.js — UN SEUL conteneur, DEUX hostnames Traefik.
  # Le middleware Next.js filtre les routes selon Host.
  frontend:
    environment:
      NEXT_PUBLIC_API_URL: http://api.lvh.me
      NEXT_PUBLIC_WS_URL: ws://ws.lvh.me
      NEXT_PUBLIC_PUBLIC_HOST: destinationci.lvh.me
      NEXT_PUBLIC_ADMIN_HOST: inhpadmin.lvh.me
      NODE_ENV: production
    labels:
      - traefik.enable=true
      - traefik.http.routers.front-public-local.rule=Host(`destinationci.lvh.me`)
      - traefik.http.routers.front-public-local.entrypoints=web
      - traefik.http.routers.front-public-local.service=front-local-svc
      - traefik.http.routers.front-admin-local.rule=Host(`inhpadmin.lvh.me`)
      - traefik.http.routers.front-admin-local.entrypoints=web
      - traefik.http.routers.front-admin-local.service=front-local-svc
      - traefik.http.services.front-local-svc.loadbalancer.server.port=3000
