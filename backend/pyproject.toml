[tool.black]
line-length = 100
target-version = ["py311"]
exclude = '''
/(
    \.git
  | \.venv
  | migrations
  | build
)/
'''

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["migrations"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "DJ", "S", "C90", "N"]
ignore = ["S101", "DJ001", "B008"]

[tool.ruff.lint.per-file-ignores]
"**/tests/**" = ["S", "DJ"]
"**/migrations/**" = ["E", "F", "I", "B", "UP", "DJ", "N"]
"**/settings/*" = ["S105", "S106", "F403", "F405"]

[tool.mypy]
python_version = "3.11"
plugins = ["mypy_django_plugin.main", "mypy_drf_plugin.main"]
ignore_missing_imports = true
disallow_untyped_defs = false

[tool.django-stubs]
django_settings_module = "config.settings.dev"
