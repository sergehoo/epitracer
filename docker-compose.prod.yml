# ===========================================================================
# EpiTrace — overlay PRODUCTION (Traefik EXTERNE déjà installé sur l'hôte).
#
# Ce fichier suppose qu'un service Traefik tourne déjà sur le serveur,
# rattaché à un réseau Docker dont le nom est passé via $TRAEFIK_NETWORK
# (défaut : `traefik` — équivalent du nom courant sur la plupart des stacks).
#
# Usage :
#   export TRAEFIK_NETWORK=traefik              # nom du réseau Traefik externe
#   export TRAEFIK_CERT_RESOLVER=le             # nom du resolver dans Traefik
#   export PUBLIC_HOST=destinationci.com
#   export ADMIN_HOST=inhpadmin.ci
#   export API_HOST=api.epitrace.gouv.ci
#   export WS_HOST=ws.epitrace.gouv.ci
#   export GRAFANA_HOST=grafana.epitrace.gouv.ci
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Aucune publication de port 80/443 : c'est Traefik (hôte) qui s'en occupe.
# ===========================================================================

services:

  # --- Backend Django -----------------------------------------------------
  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${API_HOST:-api.epitrace.gouv.ci},${PUBLIC_HOST:-destinationci.com},${ADMIN_HOST:-inhpadmin.ci},web
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${API_HOST:-api.epitrace.gouv.ci},https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-inhpadmin.ci}
      DJANGO_CORS_ALLOWED_ORIGINS: https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-inhpadmin.ci}
      SECURE_SSL_REDIRECT: "1"
      SESSION_COOKIE_SECURE: "1"
      CSRF_COOKIE_SECURE: "1"
      SECURE_HSTS_SECONDS: "31536000"
    ports: []   # on retire la publication directe (Traefik s'en charge)
    networks: [default, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.epitrace-api.rule=Host(`${API_HOST:-api.epitrace.gouv.ci}`)
      - traefik.http.routers.epitrace-api.entrypoints=websecure
      - traefik.http.routers.epitrace-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.epitrace-api.loadbalancer.server.port=8000

  # --- WebSocket / Channels ----------------------------------------------
  channels:
    ports: []
    networks: [default, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.epitrace-ws.rule=Host(`${WS_HOST:-ws.epitrace.gouv.ci}`)
      - traefik.http.routers.epitrace-ws.entrypoints=websecure
      - traefik.http.routers.epitrace-ws.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.epitrace-ws.loadbalancer.server.port=8001

  # --- Frontend Next.js (deux hostnames : public + admin) ---------------
  frontend:
    environment:
      NEXT_PUBLIC_API_URL: https://${API_HOST:-api.epitrace.gouv.ci}
      NEXT_PUBLIC_WS_URL: wss://${WS_HOST:-ws.epitrace.gouv.ci}
      NEXT_PUBLIC_PUBLIC_HOST: ${PUBLIC_HOST:-destinationci.com}
      NEXT_PUBLIC_ADMIN_HOST: ${ADMIN_HOST:-inhpadmin.ci}
      NODE_ENV: production
    ports: []
    networks: [default, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      # Portail PUBLIC voyageurs
      - traefik.http.routers.epitrace-public.rule=Host(`${PUBLIC_HOST:-destinationci.com}`) || Host(`www.${PUBLIC_HOST:-destinationci.com}`)
      - traefik.http.routers.epitrace-public.entrypoints=websecure
      - traefik.http.routers.epitrace-public.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.routers.epitrace-public.service=epitrace-frontend
      # Portail ADMIN INHP
      - traefik.http.routers.epitrace-admin.rule=Host(`${ADMIN_HOST:-inhpadmin.ci}`) || Host(`www.${ADMIN_HOST:-inhpadmin.ci}`)
      - traefik.http.routers.epitrace-admin.entrypoints=websecure
      - traefik.http.routers.epitrace-admin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.routers.epitrace-admin.service=epitrace-frontend
      - traefik.http.services.epitrace-frontend.loadbalancer.server.port=3000

  # --- Observabilité interne (non exposée publiquement par défaut) ------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [default, traefik]
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-traefik}
      - traefik.http.routers.epitrace-grafana.rule=Host(`${GRAFANA_HOST:-grafana.epitrace.gouv.ci}`)
      - traefik.http.routers.epitrace-grafana.entrypoints=websecure
      - traefik.http.routers.epitrace-grafana.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-le}
      - traefik.http.services.epitrace-grafana.loadbalancer.server.port=3000

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

networks:
  # Réseau Traefik EXTERNE (créé par le déploiement Traefik existant)
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik}

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
