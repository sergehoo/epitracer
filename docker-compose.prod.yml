version: "3.9"

# ===========================================================================
# EpidemiTracker — overlay PRODUCTION.
# Usage : docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Traefik route :
#   https://api.epitrace.gouv.ci      → service web (Django REST)
#   https://ws.epitrace.gouv.ci       → service channels (WebSocket)
#   https://destinationci.com          → service frontend (portail PUBLIC)
#   https://inhpadmin.ci               → service frontend (portail ADMIN)
#   https://grafana.epitrace.gouv.ci  → Grafana
# ===========================================================================

services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.file.directory=/etc/traefik/dynamic
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL:-admin@epitrace.gouv.ci}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.tlschallenge=true
      - --metrics.prometheus=true
      - --api.dashboard=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/letsencrypt
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - default

  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${API_HOST:-api.epitrace.gouv.ci},${PUBLIC_HOST:-destinationci.com},${ADMIN_HOST:-inhpadmin.ci},web
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${API_HOST:-api.epitrace.gouv.ci},https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-inhpadmin.ci}
      DJANGO_CORS_ALLOWED_ORIGINS: https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-inhpadmin.ci}
      SECURE_SSL_REDIRECT: "1"
      SESSION_COOKIE_SECURE: "1"
      CSRF_COOKIE_SECURE: "1"
      SECURE_HSTS_SECONDS: "31536000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.api.rule=Host(`${API_HOST:-api.epitrace.gouv.ci}`)
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=le
      - traefik.http.services.api.loadbalancer.server.port=8000

  channels:
    labels:
      - traefik.enable=true
      - traefik.http.routers.ws.rule=Host(`${WS_HOST:-ws.epitrace.gouv.ci}`)
      - traefik.http.routers.ws.entrypoints=websecure
      - traefik.http.routers.ws.tls.certresolver=le
      - traefik.http.services.ws.loadbalancer.server.port=8001

  frontend:
    environment:
      NEXT_PUBLIC_API_URL: https://${API_HOST:-api.epitrace.gouv.ci}
      NEXT_PUBLIC_WS_URL: wss://${WS_HOST:-ws.epitrace.gouv.ci}
      NEXT_PUBLIC_PUBLIC_HOST: ${PUBLIC_HOST:-destinationci.com}
      NEXT_PUBLIC_ADMIN_HOST: ${ADMIN_HOST:-inhpadmin.ci}
      NODE_ENV: production
    labels:
      - traefik.enable=true
      # Le SAME conteneur sert les deux domaines — c'est le middleware Next.js
      # qui filtre les routes selon le Host header.
      - traefik.http.routers.public.rule=Host(`${PUBLIC_HOST:-destinationci.com}`) || Host(`www.${PUBLIC_HOST:-destinationci.com}`)
      - traefik.http.routers.public.entrypoints=websecure
      - traefik.http.routers.public.tls.certresolver=le
      - traefik.http.routers.public.service=frontend-svc
      - traefik.http.routers.admin.rule=Host(`${ADMIN_HOST:-inhpadmin.ci}`) || Host(`www.${ADMIN_HOST:-inhpadmin.ci}`)
      - traefik.http.routers.admin.entrypoints=websecure
      - traefik.http.routers.admin.tls.certresolver=le
      - traefik.http.routers.admin.service=frontend-svc
      - traefik.http.services.frontend-svc.loadbalancer.server.port=3000

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_HOST:-grafana.epitrace.gouv.ci}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls.certresolver=le
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

volumes:
  traefik_acme:
  prometheus_data:
  grafana_data:
  loki_data:
