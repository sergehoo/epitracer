# ===========================================================================
# EpiTrace — overlay PRODUCTION (Traefik EXTERNE déjà installé sur l'hôte).
#
# Configuration alignée sur le Traefik existant du serveur :
#   - Réseau Docker externe : `proxy`
#   - Cert resolver         : `lets`
#
# Surcharges possibles via env :
#   export TRAEFIK_NETWORK=proxy
#   export TRAEFIK_CERT_RESOLVER=lets
#   export PUBLIC_HOST=destinationci.com
#   export ADMIN_HOST=admin.veillesanitaire.com
#   export API_HOST=api.veillesanitaire.com
#   export WS_HOST=ws.veillesanitaire.com
#   export GRAFANA_HOST=grafana.veillesanitaire.com
#
# Usage :
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Aucune publication de port 80/443 : Traefik (hôte) gère le routage TLS.
# ===========================================================================

services:

  # Note : aucun port n'est publié sur l'hôte dans le compose de base.
  # Cet overlay rajoute uniquement les labels Traefik et les variables
  # de production. Mailhog reste interne en prod (les emails partent par
  # Anymail / SMTP réel — voir DEFAULT_FROM_EMAIL + ANYMAIL_*).

  # --- Backend Django (gunicorn) -----------------------------------------
  web:
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${API_HOST:-api.veillesanitaire.com},${WS_HOST:-ws.veillesanitaire.com},${PUBLIC_HOST:-destinationci.com},${ADMIN_HOST:-admin.veillesanitaire.com},web,localhost,127.0.0.1
      DJANGO_CSRF_TRUSTED_ORIGINS: https://${API_HOST:-api.veillesanitaire.com},https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-admin.veillesanitaire.com}
      DJANGO_CORS_ALLOWED_ORIGINS: https://${PUBLIC_HOST:-destinationci.com},https://${ADMIN_HOST:-admin.veillesanitaire.com}
      SECURE_SSL_REDIRECT: "1"
      SESSION_COOKIE_SECURE: "1"
      CSRF_COOKIE_SECURE: "1"
      SECURE_HSTS_SECONDS: "31536000"
    ports: []
    networks: [default, proxy]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      # Router HTTPS API — capture api.veillesanitaire.com.
      # Le routage WebSocket est sur un sous-domaine dédié (WS_HOST,
      # défaut ws.veillesanitaire.com) pour éviter le conflit Host
      # observé avec PathPrefix sur certaines versions de Traefik.
      - "traefik.http.routers.epitrace-api.rule=Host(`${API_HOST:-api.veillesanitaire.com}`)"
      - "traefik.http.routers.epitrace-api.entrypoints=websecure"
      - "traefik.http.routers.epitrace-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-lets}"
      - "traefik.http.services.epitrace-api.loadbalancer.server.port=8000"
      # Middlewares sécurité + compression
      - "traefik.http.middlewares.epitrace-api-compress.compress=true"
      - "traefik.http.middlewares.epitrace-api-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.epitrace-api-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.epitrace-api-sec.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.epitrace-api-sec.headers.frameDeny=true"
      - "traefik.http.middlewares.epitrace-api-sec.headers.contentTypeNosniff=true"
      - "traefik.http.routers.epitrace-api.middlewares=epitrace-api-compress,epitrace-api-sec"

  # --- WebSocket / Channels ----------------------------------------------
  # SOUS-DOMAINE DÉDIÉ : ws.veillesanitaire.com → Daphne ASGI port 8001.
  # Évite tout conflit avec api.veillesanitaire.com.
  # PRÉ-REQUIS : créer un A record DNS pour ws.veillesanitaire.com
  # qui pointe vers la même IP que api.veillesanitaire.com.
  channels:
    ports: []
    networks: [default, proxy]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.epitrace-ws.rule=Host(`${WS_HOST:-ws.veillesanitaire.com}`)"
      - "traefik.http.routers.epitrace-ws.entrypoints=websecure"
      - "traefik.http.routers.epitrace-ws.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-lets}"
      - "traefik.http.services.epitrace-ws.loadbalancer.server.port=8001"

  # --- Frontend Next.js (deux hostnames : public + admin) ---------------
  # IMPORTANT : ces variables doivent être présentes AU BUILD pour que Next.js
  # les injecte dans le bundle navigateur. C'est pour ça qu'on duplique en
  # build.args (consommé par le Dockerfile multi-stage) ET en environment
  # (utilisé côté serveur pour SSR & API routes Next).
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: https://${API_HOST:-api.veillesanitaire.com}
        NEXT_PUBLIC_WS_URL: wss://${WS_HOST:-ws.veillesanitaire.com}
        NEXT_PUBLIC_PUBLIC_HOST: ${PUBLIC_HOST:-destinationci.com}
        NEXT_PUBLIC_ADMIN_HOST: ${ADMIN_HOST:-admin.veillesanitaire.com}
    environment:
      NEXT_PUBLIC_API_URL: https://${API_HOST:-api.veillesanitaire.com}
      NEXT_PUBLIC_WS_URL: wss://${WS_HOST:-ws.veillesanitaire.com}
      NEXT_PUBLIC_PUBLIC_HOST: ${PUBLIC_HOST:-destinationci.com}
      NEXT_PUBLIC_ADMIN_HOST: ${ADMIN_HOST:-admin.veillesanitaire.com}
      NODE_ENV: production
    ports: []
    networks: [default, proxy]
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"

      # Portail PUBLIC voyageurs (sans www. — pas de record DNS séparé)
      - "traefik.http.routers.epitrace-public.rule=Host(`${PUBLIC_HOST:-destinationci.com}`)"
      - "traefik.http.routers.epitrace-public.entrypoints=websecure"
      - "traefik.http.routers.epitrace-public.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-lets}"
      - "traefik.http.routers.epitrace-public.service=epitrace-frontend"

      # Portail ADMIN INHP (sans www. — pas de record DNS séparé)
      - "traefik.http.routers.epitrace-admin.rule=Host(`${ADMIN_HOST:-admin.veillesanitaire.com}`)"
      - "traefik.http.routers.epitrace-admin.entrypoints=websecure"
      - "traefik.http.routers.epitrace-admin.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-lets}"
      - "traefik.http.routers.epitrace-admin.service=epitrace-frontend"

      - "traefik.http.services.epitrace-frontend.loadbalancer.server.port=3000"

      # Middlewares sécurité + compression
      - "traefik.http.middlewares.epitrace-front-compress.compress=true"
      - "traefik.http.middlewares.epitrace-front-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.epitrace-front-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.epitrace-front-sec.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.epitrace-front-sec.headers.frameDeny=true"
      - "traefik.http.middlewares.epitrace-front-sec.headers.contentTypeNosniff=true"
      - "traefik.http.routers.epitrace-public.middlewares=epitrace-front-compress,epitrace-front-sec"
      - "traefik.http.routers.epitrace-admin.middlewares=epitrace-front-compress,epitrace-front-sec"

  # --- Observabilité interne ---------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks: [default, proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${TRAEFIK_NETWORK:-proxy}"
      - "traefik.http.routers.epitrace-grafana.rule=Host(`${GRAFANA_HOST:-grafana.veillesanitaire.com}`)"
      - "traefik.http.routers.epitrace-grafana.entrypoints=websecure"
      - "traefik.http.routers.epitrace-grafana.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-lets}"
      - "traefik.http.services.epitrace-grafana.loadbalancer.server.port=3000"

  loki:
    image: grafana/loki:3.2.0
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.0
    restart: unless-stopped
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml

networks:
  # Réseau Traefik EXTERNE (créé par le déploiement Traefik existant)
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
