# ===========================================================================
# EpidemiTracker - stack de développement complète.
# Pour la production, surcoucher avec docker-compose.prod.yml
# (Traefik HTTPS + monitoring + Loki).
# ===========================================================================

x-django-env: &django-env
  DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.dev}
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-change-me}
  DJANGO_DEBUG: ${DJANGO_DEBUG:-1}
  DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
  DATABASE_URL: postgis://epidemi:epidemi@db:5432/epidemitracker
  REDIS_URL: redis://redis:6379/0
  CHANNEL_REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: redis://redis:6379/2
  CELERY_RESULT_BACKEND: redis://redis:6379/3
  CACHE_URL: redis://redis:6379/4
  HEALTHPASS_PRIVATE_KEY_PATH: /app/keys/healthpass_ed25519_private.pem
  HEALTHPASS_PUBLIC_KEY_PATH: /app/keys/healthpass_ed25519_public.pem
  HEALTHPASS_ISSUER: ${HEALTHPASS_ISSUER:-MINSAN-CI}
  NATIONAL_ORG_NAME: ${NATIONAL_ORG_NAME:-Ministère de la Santé}
  DEFAULT_QUARANTINE_DAYS: ${DEFAULT_QUARANTINE_DAYS:-21}
  TIME_ZONE: ${DJANGO_TIME_ZONE:-Africa/Abidjan}
  # ── Notifications SMS / WhatsApp ────────────────────────────────────
  # Orange Côte d'Ivoire (SMS pour numéros +225)
  ORANGE_CI_SMS_ENABLED: ${ORANGE_CI_SMS_ENABLED:-false}
  ORANGE_CI_SMS_CLIENT_ID: ${ORANGE_CI_SMS_CLIENT_ID:-}
  ORANGE_CI_SMS_CLIENT_SECRET: ${ORANGE_CI_SMS_CLIENT_SECRET:-}
  # MSISDN émetteur (E.164) — OBLIGATOIRE pour que les SMS soient routés.
  # C'est le numéro Orange CI du contrat (différent du sender ID alphanumérique).
  ORANGE_CI_SMS_SENDER_MSISDN: ${ORANGE_CI_SMS_SENDER_MSISDN:-}
  ORANGE_CI_SMS_SENDER_NAME: ${ORANGE_CI_SMS_SENDER_NAME:-INHP}
  ORANGE_CI_SMS_BASE_URL: ${ORANGE_CI_SMS_BASE_URL:-https://api.orange.com/smsmessaging/v1}
  ORANGE_CI_SMS_TOKEN_URL: ${ORANGE_CI_SMS_TOKEN_URL:-https://api.orange.com/oauth/v3/token}
  ORANGE_CI_SMS_TIMEOUT: ${ORANGE_CI_SMS_TIMEOUT:-15}
  ORANGE_CI_WEBHOOK_TOKEN: ${ORANGE_CI_WEBHOOK_TOKEN:-}
  # URL publique du webhook delivery report — Orange CI appelle cette URL
  # pour chaque SMS avec deliveryInfoNotification. Doit être HTTPS et
  # accessible publiquement. Ex: https://api.veillesanitaire.com/api/v1/notifications/webhooks/orange-ci/sms/status/
  ORANGE_CI_SMS_CALLBACK_URL: ${ORANGE_CI_SMS_CALLBACK_URL:-}
  # Twilio (SMS international + WhatsApp Twilio)
  TWILIO_SMS_ENABLED: ${TWILIO_SMS_ENABLED:-false}
  TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
  TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
  TWILIO_TIMEOUT: ${TWILIO_TIMEOUT:-15}
  TWILIO_STATUS_CALLBACK_BASE: ${TWILIO_STATUS_CALLBACK_BASE:-https://api.veillesanitaire.com}
  # WhatsApp (Twilio ou Meta Cloud API)
  WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
  WHATSAPP_PROVIDER: ${WHATSAPP_PROVIDER:-twilio}
  TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-}
  WHATSAPP_FROM_NUMBER: ${WHATSAPP_FROM_NUMBER:-}
  META_WHATSAPP_TOKEN: ${META_WHATSAPP_TOKEN:-}
  META_WHATSAPP_PHONE_NUMBER_ID: ${META_WHATSAPP_PHONE_NUMBER_ID:-}
  META_WHATSAPP_BUSINESS_ACCOUNT_ID: ${META_WHATSAPP_BUSINESS_ACCOUNT_ID:-}
  META_WHATSAPP_VERIFY_TOKEN: ${META_WHATSAPP_VERIFY_TOKEN:-}
  META_WHATSAPP_APP_SECRET: ${META_WHATSAPP_APP_SECRET:-}
  META_WHATSAPP_API_VERSION: ${META_WHATSAPP_API_VERSION:-v19.0}
  WHATSAPP_TIMEOUT: ${WHATSAPP_TIMEOUT:-15}

services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: epidemitracker
      POSTGRES_USER: epidemi
      POSTGRES_PASSWORD: epidemi
    # Pas de publication de port par défaut : `db` est interne au réseau Docker.
    # Pour accéder depuis l'hôte (ex: pgAdmin), surcoucher avec
    # docker-compose.dev-ports.yml (voir ce fichier).
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U epidemi -d epidemitracker"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    # Pas de publication de port par défaut (voir db ci-dessus).
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "1"
    image: epidemitracker/backend:dev
    restart: unless-stopped
    environment: *django-env
    command: ["web"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    # Pas de publication par défaut : Traefik (ou docker-compose.dev-ports.yml)
    # publie le port quand nécessaire.
    volumes:
      - ./backend:/app
      - keys_data:/app/keys
      - media_data:/app/media
      # Volume nommé pour les statiques : le bind-mount ./backend:/app écrase
      # /app/staticfiles créé dans le Dockerfile ; ce volume rétablit un dossier
      # accessible en écriture par l'utilisateur "app" du container.
      - staticfiles_data:/app/staticfiles

  channels:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "1"
    image: epidemitracker/backend:dev
    restart: unless-stopped
    environment: *django-env
    command: ["asgi"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - keys_data:/app/keys
      - staticfiles_data:/app/staticfiles

  worker:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "1"
    image: epidemitracker/backend:dev
    restart: unless-stopped
    environment: *django-env
    command: ["worker"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - keys_data:/app/keys
      - media_data:/app/media
      - staticfiles_data:/app/staticfiles
      # Backups écrits par la tâche Celery core.run_postgres_backup
      - backups_data:/backups

  beat:
    build:
      context: ./backend
      args:
        INSTALL_DEV: "1"
    image: epidemitracker/backend:dev
    restart: unless-stopped
    environment: *django-env
    command: ["beat"]
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - ./backend:/app
      - staticfiles_data:/app/staticfiles

  mailhog:
    image: mailhog/mailhog:latest
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      # IMPORTANT : Next.js bake les NEXT_PUBLIC_* à la phase build (pas runtime).
      # Ces ARG sont consommés par frontend/Dockerfile pour générer un bundle
      # qui contient les bonnes URLs (et non les defaults http://localhost:8000).
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://web:8000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://channels:8001}
        NEXT_PUBLIC_PUBLIC_HOST: ${NEXT_PUBLIC_PUBLIC_HOST:-${PUBLIC_HOST:-localhost}}
        NEXT_PUBLIC_ADMIN_HOST: ${NEXT_PUBLIC_ADMIN_HOST:-${ADMIN_HOST:-localhost}}
    image: epidemitracker/frontend:dev
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://web:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://channels:8001}
      NODE_ENV: production
    depends_on:
      - web

volumes:
  db_data:
  redis_data:
  keys_data:
  media_data:
  staticfiles_data:
  # Dumps PostgreSQL produits par scripts/backup_postgres.sh ou Celery.
  # En prod, à monter en bind-mount sur le disque secondaire ou à syncer
  # vers S3/Backblaze (voir scripts/backup_postgres.sh + REMOTE_TARGET).
  backups_data:
